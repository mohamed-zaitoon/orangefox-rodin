name: OrangeFox Recovery

on:
  workflow_dispatch:
    inputs:
      branch:
        description: OrangeFox sync branch
        required: true
        default: "14.1"
      lunch:
        description: Lunch target
        required: true
        default: "twrp_rodin-ap2a-eng"
      build_target:
        description: Build target
        required: true
        default: "vendorbootimage"
      runner:
        description: Runner label
        required: true
        default: "self-hosted"

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 720

    steps:
      - name: Checkout device tree
        uses: actions/checkout@v4
        with:
          path: device-tree

      - name: Install host packages
        shell: bash
        run: |
          set -euo pipefail
          if command -v sudo >/dev/null 2>&1 && command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y \
              bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
              git gnupg gperf imagemagick lib32ncurses-dev lib32readline-dev \
              lib32z1-dev libelf-dev liblz4-tool libncurses-dev libsdl1.2-dev \
              libssl-dev libxml2 libxml2-utils lz4 pngcrush rsync schedtool \
              squashfs-tools unzip xsltproc zip zlib1g-dev
          fi

      - name: Install repo tool
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/bin"
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o "$HOME/bin/repo"
          chmod +x "$HOME/bin/repo"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Sync OrangeFox
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/ofox-sync"
          git clone https://gitlab.com/OrangeFox/sync.git "$GITHUB_WORKSPACE/ofox-sync/sync"
          "$GITHUB_WORKSPACE/ofox-sync/sync/orangefox_sync.sh" \
            --branch "${{ inputs.branch }}" \
            --path "$GITHUB_WORKSPACE/OrangeFox"

      - name: Place rodin device tree
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/OrangeFox/device/xiaomi"
          rsync -a --delete \
            --exclude ".git" \
            --exclude "images" \
            "$GITHUB_WORKSPACE/device-tree/" \
            "$GITHUB_WORKSPACE/OrangeFox/device/xiaomi/rodin/"

      - name: Build OrangeFox
        shell: bash
        working-directory: ${{ github.workspace }}/OrangeFox
        env:
          ALLOW_MISSING_DEPENDENCIES: "true"
          FOX_BUILD_DEVICE: rodin
          FOX_AB_DEVICE: "1"
          FOX_VIRTUAL_AB_DEVICE: "1"
          OF_FORCE_PREBUILT_KERNEL: "1"
          OF_LOW_MEMORY_BUILD: "1"
          OF_BUILD_JOBS: "1"
          NINJA_ARGS: "-j1 -l1"
          SOONG_UI_NINJA_ARGS: "-j1 -l1"
          NINJA_HIGHMEM_NUM_JOBS: "1"
          GOMAXPROCS: "1"
          GOGC: "20"
          GOMEMLIMIT: "6GiB"
          _JAVA_OPTIONS: "-Xmx1g"
          LC_ALL: C
          USE_CCACHE: "1"
          CCACHE_EXEC: /usr/bin/ccache
        run: |
          set -euo pipefail
          ccache -M 50G || true
          source build/envsetup.sh
          lunch "${{ inputs.lunch }}"
          mka -j"${OF_BUILD_JOBS}" adbd "${{ inputs.build_target }}" 2>&1 | tee "$GITHUB_WORKSPACE/orangefox-build.log"

      - name: Collect artifacts
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          if [ -d "$GITHUB_WORKSPACE/OrangeFox/out/target/product/rodin" ]; then
            find "$GITHUB_WORKSPACE/OrangeFox/out/target/product/rodin" \
              -maxdepth 1 -type f \( -name "*.img" -o -name "*.zip" -o -name "*.txt" \) \
              -exec cp -v {} "$GITHUB_WORKSPACE/artifacts/" \;
          fi
          cp -v "$GITHUB_WORKSPACE/orangefox-build.log" "$GITHUB_WORKSPACE/artifacts/" || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orangefox-rodin
          path: artifacts
          if-no-files-found: warn
